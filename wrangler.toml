name = "headacher"
main = "worker/index.ts"
compatibility_date = "2025-08-03"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist/client"

[[d1_databases]]
binding = "DB"
database_name = "headacher-production"
database_id = "c0e1170f-a16c-4d93-abbe-e0e4192042ae"
preview_database_id = "headacher"

# JWT Secret Key (generate with: wrangler secret put JWT_SECRET_KEY)
# For production, use: wrangler secret put JWT_SECRET_KEY
[vars]
# JWT_SECRET_KEY = "your-development-jwt-secret-key-here-replace-with-proper-secret"
FIREBASE_PROJECT_ID = "headacher-c4d8d"
# Google Health OAuth (also set GOOGLE_OAUTH_CLIENT_SECRET via wrangler secret put)
GOOGLE_HEALTH_PROJECT_ID = "gen-lang-client-0191948102"
GOOGLE_OAUTH_CLIENT_ID = "735550244008-4m6bodtn39mk3b06c3h75ea2olitq74b.apps.googleusercontent.com"
GOOGLE_OAUTH_REDIRECT_URI = "https://headacher.sirsean.me/api/integrations/google-health/callback"

[triggers]
crons = ["0 * * * *"]

[[routes]]
pattern = "headacher.sirsean.me"
custom_domain = true

[observability.logs]
enabled = true

